<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>UNIP Calc</title>
</head>
<body>
    <header></header>
    
    <main>
        <!-- Inputs -->
        <div class="div-n1">
            <label for="n1">Insira sua nota da NP2:</label>
            <input type="number" name="nota_1" id="n1" placeholder="0,0">
        </div>
        <div class="div-n2">
            <label for="n2">Insira sua nota da NP2:</label>
            <input type="number" name="nota_2" id="n2" placeholder="0,0">
        </div>
        <div class="div-trab">
            <label for="trab">Trabalho / Ponto extra:</label>
            <input type="number" name="nota_trab" id="trab" placeholder="0,0">
        </div>

        <!-- Calcular -->
        <button type="submit">Calcular</button>
        
        <!-- Resultado -->
        <div class="div-resultado">
            <p>Sua média foi:</p>
            <!--Aqui vão as variaveis-->
            <p id="media">6</p>
            <p id="resultado">Você ficou de exame.</p>
        </div>

        <!--Exibe se ficar de exame -->
        <div class="bloco-exame" hidden> <!--hidden por padrão-->
            <hr>
            <div class="div-nota-exame">
                <label for="ex">Insira a nota do Exame:</label>
                <input type="number" name="nota_exame" id="ex" placeholder="0,0">
            </div>
            <div class="div-trab-exame">
                <label for="trab-ex">Trabalho / Ponto extra:</label>
                <input type="number" name="trab_exame" id="trab-ex">
            </div>
            <button type="submit" name="calcular_exame">Calcular</button>

            <div class="resultado-exame">
                <p>Sua média foi:</p>
                <!--Aqui vão as variaveis-->
                <p id="media-exame">6</p>
                <p id="resultado-final">Você ficou de exame.</p>
            </div>
        </div>
    </main>

    <footer></footer>
</body>
<script src="script.js"/></script>
</html>
